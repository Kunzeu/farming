[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pg-native", "bcryptjs"]
  included_files = ["src/**"]

# Configuración para Next.js 16
[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  autoLaunch = false

